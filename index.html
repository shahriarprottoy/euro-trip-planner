<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EuroTrip | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">
    <div class="login-card">
        <h1>🌍 EuroTrip</h1>
        <p>Plan your European dream trip based on your budget.</p>
        <form id="login-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" style="width: 100%; margin-top: 1rem;">Enter Planner</button>
        </form>
    </div>
    <script src="auth.js"></script>
</body>
</html>
