<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EuroTrip | Welcome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">
    <div class="hero-overlay">
        <div class="welcome-text">
            <h1>🌍 EuroTrip Planner</h1>
            <p class="intro-message">
                Have limited budget but don't know where to plan your next Europe trip? 
                We provide guidance on Europe trips based on your budget and choice. 
                <strong>Welcome to our service.</strong>
            </p>
        </div>

        <div class="login-card">
            <h3>Member Login</h3>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="primary-btn">Start Planning</button>
            </form>
        </div>
    </div>
    <script src="auth.js"></script>
</body>
</html>
