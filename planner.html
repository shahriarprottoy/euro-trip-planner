<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EuroTrip | Planner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><strong>EuroTrip</strong> Planner</div>
        <div class="nav-user">
            <span id="user-display"></span>
            <button onclick="logout()" style="background:#ef4444; margin-left:10px; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <section class="card-panel">
            <div class="input-group">
                <label>Budget</label>
                <input type="number" id="budget" placeholder="Total Amount">
            </div>
            <div class="input-group">
                <label>Days</label>
                <input type="number" id="days" placeholder="Qty">
            </div>
            <div class="input-group">
                <label>Currency</label>
                <select id="currency-select">
                    <option value="EUR">EUR (€)</option>
                    <option value="USD">USD ($)</option>
                    <option value="GBP">GBP (£)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Vibe</label>
                <select id="preference">
                    <option value="any">All</option>
                    <option value="history">History</option>
                    <option value="nightlife">Nightlife</option>
                    <option value="nature">Nature</option>
                </select>
            </div>
            <button id="search-btn">Search</button>
        </section>

        <div id="map" style="height: 400px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ddd;"></div>

        <div id="results-container" class="results-grid"></div>

        <hr style="margin: 40px 0;">

        <section class="feedback-section">
            <h2>Share Your Experiences to Make Us Grow</h2>
            <form id="feedback-form">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="visited-city" placeholder="City" style="flex:1" required>
                    <input type="text" id="visited-country" placeholder="Country" style="flex:1" required>
                </div>
                <input type="number" id="actual-cost" placeholder="Actual Daily Cost Spent" style="width:100%; margin-bottom:10px;" required>
                <button type="submit" class="submit-btn" style="width:100%; background:#10b981; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">Save Data</button>
            </form>
            <div class="history-container" style="margin-top:20px;">
                <h3>Your Travel History</h3>
                <ul id="history-list"></ul>
            </div>
        </section>

        <div id="comparison-tray" class="comparison-tray hidden">
            <span id="compare-count">0 selected</span>
            <button id="open-compare-btn">Compare Now</button>
        </div>

        <div id="compare-modal" class="modal hidden">
            <div class="modal-content">
                <button onclick="document.getElementById('compare-modal').classList.add('hidden')" style="float:right;">Close</button>
                <h2>Comparison Table</h2>
                <div id="compare-table-container"></div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
