<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EuroTrip Budget Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Europe Trip Suggester</h1>
        <p>Discover where your budget can take you.</p>
    </header>

    <main>
        <div class="card-panel">
            <div class="input-group">
                <label>Total Budget (€)</label>
                <input type="number" id="budget" placeholder="e.g. 1000">
            </div>
            <div class="input-group">
                <label>Duration (Days)</label>
                <input type="number" id="days" placeholder="e.g. 7">
            </div>
            <div class="input-group">
                <label>Vibe</label>
                <select id="preference">
                    <option value="any">Surprise Me</option>
                    <option value="history">History</option>
                    <option value="nightlife">Nightlife</option>
                    <option value="food">Food</option>
                    <option value="nature">Nature</option>
                    <option value="budget">Budget Friendly</option>
                </select>
            </div>
            <button id="search-btn">Search Destinations</button>
        </div>

        <div id="results-container" class="results-grid">
            </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
