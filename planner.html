<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EuroTrip | Planner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><strong>EuroTrip</strong> Planner</div>
        <div class="nav-user">
            <span id="user-display"></span>
            <button onclick="logout()" style="background:#ef4444; margin-left:10px; padding:5px 10px;">Logout</button>
        </div>
    </nav>

    <div class="container">
        <section class="card-panel">
            <div class="input-group">
                <label>Budget</label>
                <input type="number" id="budget" placeholder="€">
            </div>
            <div class="input-group">
                <label>Days</label>
                <input type="number" id="days" placeholder="Qty">
            </div>
            <div class="input-group">
                <label>Currency</label>
                <select id="currency-select">
                    <option value="EUR">EUR (€)</option>
                    <option value="USD">USD ($)</option>
                    <option value="GBP">GBP (£)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Vibe</label>
                <select id="preference">
                    <option value="any">All</option>
                    <option value="history">History</option>
                    <option value="nightlife">Nightlife</option>
                    <option value="nature">Nature</option>
                </select>
            </div>
            <button id="search-btn" style="align-self: flex-end;">Search</button>
        </section>

        <div id="map"></div>

        <div id="results-container" class="results-grid"></div>

        <div id="comparison-tray" class="comparison-tray hidden">
            <span id="compare-count">0 selected</span>
            <button id="open-compare-btn" style="background:white; color:var(--primary); margin-left:15px;">Compare Now</button>
        </div>

        <div id="compare-modal" class="modal hidden">
            <div class="modal-content">
                <button onclick="document.getElementById('compare-modal').classList.add('hidden')" style="float:right;">Close</button>
                <h2>Comparison Table</h2>
                <div id="compare-table-container"></div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
